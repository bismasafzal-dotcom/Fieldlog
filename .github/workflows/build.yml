name: Build FieldLog

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build the app
    runs-on: ubuntu-latest

    steps:
      - name: Get the code
        uses: actions/checkout@v4

      # Drop a fieldlog.zip into the repo at ANY time and this replaces the source
      # with it. That's how you take a code update without hand-editing 10 files.
      # No zip present? It just builds whatever is already in the repo.
      - name: Take a new zip if one was uploaded
        run: |
          set -e
          ZIP=$(find . -maxdepth 2 -iname '*.zip' -not -path './.git/*' | head -n1)

          if [ -z "$ZIP" ]; then
            if [ -f settings.gradle.kts ]; then
              echo "No zip. Building the source already in the repo."
              exit 0
            fi
            echo "STOPPING: no source in the repo and no zip to unpack."
            ls -la
            exit 1
          fi

          echo "Found $ZIP — unpacking it."
          unzip -q -o "$ZIP" -d _unpacked

          SETTINGS=$(find _unpacked -name 'settings.gradle.kts' -print -quit)
          if [ -z "$SETTINGS" ]; then
            echo "STOPPING: that zip has no settings.gradle.kts in it. Nothing deleted."
            find _unpacked -maxdepth 3 | head -40
            exit 1
          fi
          ROOT=$(dirname "$SETTINGS")
          echo "Project root inside the zip: $ROOT"

          # Only now, once we KNOW the zip is good, clear the old source.
          # This makes it a clean replace — no stale files left behind to confuse the compiler.
          rm -rf app gradle
          cp -r "$ROOT"/. .
          rm -rf _unpacked "$ZIP" __MACOSX

          git config user.name "build-bot"
          git config user.email "build-bot@users.noreply.github.com"
          git add -A
          git commit -m "Update source from uploaded zip" || echo "nothing to commit"
          git push || echo "push skipped"

          echo "Source updated."

      - name: Install Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build the app
        run: |
          gradle assembleDebug --console=plain 2>&1 | tee build.log
          STATUS=${PIPESTATUS[0]}

          if [ "$STATUS" -ne 0 ]; then
            echo ""
            echo "#############################################################"
            echo "#  THE REAL ERRORS - COPY EVERYTHING BELOW                   #"
            echo "#############################################################"
            echo ""
            echo "----- Kotlin compile errors -----"
            grep -E "^e: " build.log | head -40 || echo "(none)"
            echo ""
            echo "----- Annotation processor / Room -----"
            grep -iE "^error:|\[ksp\]" build.log | head -30 || echo "(none)"
            echo ""
            echo "----- Gradle summary -----"
            grep -A 12 "What went wrong" build.log | head -30 || echo "(none)"
            echo ""
            echo "#############################################################"
            exit 1
          fi

      - name: Save the full build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Save the app file
        uses: actions/upload-artifact@v4
        with:
          name: fieldlog-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Publish it for your phone
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: FieldLog build ${{ github.run_number }}
          body: "Tap app-debug.apk below on your Android phone to install it."
          files: app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
