name: Build FieldLog

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build the app
    runs-on: ubuntu-latest

    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Show me what is actually in this repo
        run: |
          echo "===== TOP LEVEL OF THE REPO ====="
          ls -la
          echo
          echo "===== EVERY FILE (first 60) ====="
          find . -not -path './.git/*' | head -60

      - name: Unpack the project
        run: |
          set -e

          # Already unpacked? Nothing to do.
          if [ -f settings.gradle.kts ] || [ -f settings.gradle ]; then
            echo "settings.gradle.kts is already here. Nothing to unpack."
            exit 0
          fi

          # Find a zip ANYWHERE near the top, whatever it is called.
          ZIP=$(find . -maxdepth 2 -iname '*.zip' -not -path './.git/*' | head -n1)

          if [ -z "$ZIP" ]; then
            echo "STOPPING: no settings.gradle.kts and no .zip file in this repo."
            echo "The upload did not land. Here is what IS here:"
            ls -la
            exit 1
          fi

          echo "Found the zip: $ZIP"
          unzip -q -o "$ZIP" -d _unpacked

          # The project root is whichever folder inside the zip holds settings.gradle.kts.
          # Do not assume it is called 'fieldlog' - go and find it.
          SETTINGS=$(find _unpacked -name 'settings.gradle.kts' -print -quit)

          if [ -z "$SETTINGS" ]; then
            echo "STOPPING: unzipped, but no settings.gradle.kts inside."
            echo "The zip actually contained:"
            find _unpacked -maxdepth 3 | head -40
            exit 1
          fi

          ROOT=$(dirname "$SETTINGS")
          echo "Project root inside the zip: $ROOT"

          # Copy everything up to top level, hidden files (.github!) included.
          cp -r "$ROOT"/. .
          rm -rf _unpacked "$ZIP" __MACOSX

          echo "===== TOP LEVEL NOW ====="
          ls -la

          git config user.name "build-bot"
          git config user.email "build-bot@users.noreply.github.com"
          git add -A
          git commit -m "Unpack project files" || echo "nothing to commit"
          git push || echo "push skipped (not fatal, build continues)"

      - name: Check the build files are really there
        run: |
          test -f settings.gradle.kts || { echo "settings.gradle.kts STILL missing"; ls -la; exit 1; }
          test -f app/build.gradle.kts || { echo "app/build.gradle.kts missing"; ls -la; exit 1; }
          echo "Build files present. Good to compile."

      - name: Install Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build the app
        run: gradle assembleDebug --stacktrace

      - name: Save the app file
        uses: actions/upload-artifact@v4
        with:
          name: fieldlog-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Publish it for your phone
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: FieldLog build ${{ github.run_number }}
          body: "Tap app-debug.apk below on your Android phone to install it."
          files: app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
