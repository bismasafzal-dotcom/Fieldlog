name: Build FieldLog

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build the app
    runs-on: ubuntu-latest

    steps:
      - name: Get the code
        uses: actions/checkout@v4

      # FIRST RUN ONLY: the repo contains fieldlog.zip and nothing else.
      # Unpack it, commit the real files, and throw the zip away. After this,
      # the repo looks like a normal project and this step does nothing.
      - name: Unpack fieldlog.zip
        run: |
          if [ -f fieldlog.zip ]; then
            echo "Found the zip. Unpacking..."
            unzip -q -o fieldlog.zip -d _unpacked
            cp -r _unpacked/fieldlog/. .
            rm -rf _unpacked fieldlog.zip
            git config user.name "build-bot"
            git config user.email "build-bot@users.noreply.github.com"
            git add -A
            git commit -m "Unpack project files" || echo "nothing to commit"
            git push || echo "push skipped"
            echo "Unpacked. The repo now has the real files."
          else
            echo "Already unpacked. Building normally."
          fi

      - name: Install Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      # If the code has an error, it appears HERE in plain text. Copy it out.
      - name: Build the app
        run: gradle assembleDebug --stacktrace

      - name: Save the app file
        uses: actions/upload-artifact@v4
        with:
          name: fieldlog-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      # Publishes the .apk as a download link. Open it on your PHONE and tap it.
      - name: Publish it for your phone
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: FieldLog build ${{ github.run_number }}
          body: "Tap app-debug.apk below on your Android phone to install it."
          files: app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
